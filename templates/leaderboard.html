<!DOCTYPE html>
<html>
<head>
    <title>Leaderboard</title>

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;600&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #1d2671, #c33764);
        }

        .leaderboard {
            width: 450px;
            padding: 25px;
            border-radius: 15px;
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(12px);
            color: white;
            box-shadow: 0 8px 30px rgba(0,0,0,0.3);
        }

        .leaderboard h2 {
            text-align: center;
            margin-bottom: 20px;
            font-weight: 600;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        tr {
            transition: 0.3s;
        }

        td {
            padding: 12px;
            text-align: center;
            font-size: 15px;
        }

        tr:nth-child(even) {
            background: rgba(255,255,255,0.05);
        }

        tr:hover {
            background: rgba(255,255,255,0.15);
            transform: scale(1.02);
        }

        /* Top 3 Highlight */
        tr:nth-child(1) td {
            color: gold;
            font-weight: bold;
        }

        tr:nth-child(2) td {
            color: silver;
            font-weight: bold;
        }

        tr:nth-child(3) td {
            color: #cd7f32;
            font-weight: bold;
        }

        .rank {
            font-weight: bold;
            opacity: 0.7;
        }

    </style>
</head>

<body>

<div class="leaderboard">

    <h2>🏆 Leaderboard</h2>

    <table>
        {% for i in data %}
        <tr>
            <td class="rank">{{ loop.index }}</td>
            <td>{{ i.name }}</td>
            <td>{{ i.score }}</td>
        </tr>
        {% endfor %}
    </table>

</div>

</body>
</html>
